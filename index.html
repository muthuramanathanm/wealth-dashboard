<style>
:root {
  --bg: #080a0e;
  --bg2: #0a0c10;
  --card: rgba(22, 27, 38, 0.78);
  --card2: rgba(26, 32, 44, 0.66);
  --card-hover: rgba(32, 38, 54, 0.92);
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --accent: #7c6aff;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --orange: #fb923c;
  --purple: #a78bfa;
  --text: #e6eaf2;
  --muted: #828ca6;
  --shadow: 0 8px 30px rgba(0,0,0,0.35);
  --radius: 18px;
  --radius-sm: 12px;
  --font-body: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-heading: 'Outfit', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font-body);
  min-height: 100vh; line-height: 1.5; overflow-x: hidden;
  -webkit-font-smoothing: antialiased; -moz-osx-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  background-image:
    radial-gradient(ellipse 80% 55% at 50% 0%, rgba(124,106,255,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 55% 40% at 85% 100%, rgba(52,211,153,0.06) 0%, transparent 50%);
  background-attachment: fixed;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(18px); } to { opacity:1; transform: translateY(0); } }
.animate-in { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both; }

header {
  background: rgba(12,15,22,0.82);
  backdrop-filter: blur(22px) saturate(140%); -webkit-backdrop-filter: blur(22px) saturate(140%);
  border-bottom: 1px solid var(--border);
  padding: 24px 36px calc(24px + env(safe-area-inset-bottom, 0px));
  padding-left: max(36px, env(safe-area-inset-left));
  padding-right: max(36px, env(safe-area-inset-right));
  padding-top: max(24px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;
  position: sticky; top: 0; z-index: 100;
}
.header-left h1 { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
.header-left p { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }
.header-badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 0.68rem; padding: 5px 11px; border-radius: 20px; font-weight: 600; backdrop-filter: blur(8px); }
.badge-updated { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.22); }
.header-right { text-align: right; }
.net-worth-label { font-family: var(--font-heading); font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }
.net-worth-value { font-family: var(--font-heading); font-size: 2.3rem; font-weight: 800; color: var(--green); letter-spacing: -0.03em; text-shadow: 0 0 44px rgba(52,211,153,0.28); line-height: 1.05; }
.net-worth-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
.container { max-width: 1400px; margin: 0 auto; padding: 30px 36px calc(40px + env(safe-area-inset-bottom, 0px));
  padding-left: max(36px, env(safe-area-inset-left)); padding-right: max(36px, env(safe-area-inset-right)); }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 34px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; position: relative; overflow: hidden; backdrop-filter: blur(12px); box-shadow: var(--shadow); transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), border-color 0.25s, background 0.25s; }
.kpi-card:hover { background: var(--card-hover); border-color: var(--border-hover); transform: translateY(-3px); }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent-color, var(--accent)); opacity: 0.85; }
.kpi-label { font-family: var(--font-heading); font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
.kpi-value { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; margin: 7px 0 4px; letter-spacing: -0.02em; }
.kpi-sub { font-size: 0.73rem; color: var(--muted); line-height: 1.4; }
.kpi-icon { font-size: 1.7rem; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); opacity: 0.10; }

.section-title { font-family: var(--font-heading); font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.6px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 30px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 30px; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; backdrop-filter: blur(12px); box-shadow: var(--shadow); transition: border-color 0.25s, transform 0.25s; }
.card:hover { border-color: var(--border-hover); }
.card h3 { font-family: var(--font-heading); font-size: 0.9rem; font-weight: 600; margin-bottom: 18px; color: #fff; }
.chart-wrap { position: relative; height: 260px; width: 100%; }
canvas { max-width: 100%; }

.inv-list { list-style: none; }
.inv-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.inv-item:last-child { border-bottom: none; }
.inv-name { font-size: 0.85rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.inv-badge { font-size: 0.6rem; padding: 2px 7px; border-radius: 6px; font-weight: 600; text-transform: uppercase; }
.badge-active { background: rgba(52,211,153,0.12); color: var(--green); }
.badge-new { background: rgba(124,106,255,0.14); color: var(--purple); }
.inv-value { font-size: 0.85rem; font-weight: 600; text-align: right; min-width: 90px; }
.inv-sub { font-size: 0.68rem; color: var(--muted); font-weight: 400; }

.cashflow-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px; margin-bottom: 6px; }
.cashflow-in { background: rgba(52,211,153,0.06); border-left: 3px solid var(--green); }
.cashflow-out { background: rgba(248,113,113,0.06); border-left: 3px solid var(--red); }
.cashflow-neutral { background: rgba(96,165,250,0.06); border-left: 3px solid var(--blue); }
.cashflow-label { font-size: 0.82rem; }
.cashflow-value { font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
.cf-income { color: var(--green); } .cf-expense { color: var(--red); } .cf-neutral { color: var(--blue); }

.re-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 30px; }
.re-card { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; padding: 18px; transition: border-color 0.25s, transform 0.25s; }
.re-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.re-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.re-name { font-family: var(--font-heading); font-size: 0.88rem; font-weight: 600; color: #fff; }
.re-location { font-size: 0.71rem; color: var(--muted); margin-top: 3px; }
.re-value { font-family: var(--font-heading); font-size: 1.05rem; font-weight: 700; color: var(--green); white-space: nowrap; margin-left: 8px; }
.re-detail { font-size: 0.74rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.re-tag { display: inline-block; font-size: 0.62rem; padding: 3px 8px; border-radius: 6px; margin-top: 8px; font-weight: 600; }
.tag-paid { background: rgba(52,211,153,0.12); color: var(--green); }
.tag-rental { background: rgba(96,165,250,0.12); color: var(--blue); }

.income-highlight { background: linear-gradient(135deg, rgba(52,211,153,0.06), rgba(124,106,255,0.06)); border: 1px solid rgba(52,211,153,0.14); border-radius: var(--radius); padding: 24px; margin-bottom: 30px; box-shadow: var(--shadow); }
.income-highlight h3 { font-family: var(--font-heading); font-size: 0.92rem; color: #fff; margin-bottom: 16px; }
.income-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; }
.income-item { text-align: center; padding: 16px 12px; background: rgba(0,0,0,0.26); border-radius: var(--radius-sm); border: 1px solid var(--border); transition: border-color 0.2s, transform 0.2s; }
.income-item:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.income-item-label { font-family: var(--font-heading); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.income-item-value { font-family: var(--font-heading); font-size: 1.18rem; font-weight: 700; margin-top: 6px; }
.income-item-sub { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }

.liab-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.liab-item:last-child { border-bottom: none; }

<body>
<div id="gate" style="display: none;"><div class="gate-card"><div class="gate-emoji">🔒</div><h2>Wealth Dashboard</h2><p>Enter your passcode to unlock.</p><input id="gate-pass" type="password" inputmode="numeric" autocomplete="off" placeholder="Passcode" onkeydown="if(event.key===\'Enter\')unlock()" value=""><button onclick="unlock()">Unlock</button><div id="gate-err"></div></div></div>
<div id="app"></div>
<script>
var ESPP_QTY,RSU_VESTED_QTY,RSU_SELLABLE_QTY,RSU_UNVESTED_QTY,MOOMOO_ADSK_QTY,MOOMOO_SOUN_QTY;
var EDIT_DEFAULTS={},SESSION_PASS=null;
var chartAsset=null,chartGeo=null,chartDebt=null,chartIncome=null,chartTrend=null;

function getVal(k){return parseFloat(document.getElementById('ef-'+k).value)||0;}
function getStr(k){return document.getElementById('ef-'+k).value||'';}
function setText(id,t){var e=document.getElementById(id);if(!e)return;var kids=e.querySelectorAll('*');if(kids.length===0){e.textContent=t;}else{var first=e.childNodes[0];if(first&&first.nodeType===3){first.textContent=t;}else{e.insertBefore(document.createTextNode(t),e.firstChild);}}}
function calcEMI(p,r,m){if(r===0)return Math.round(p/m);var i=(r/100)/12;return Math.round(p*i*Math.pow(1+i,m)/(Math.pow(1+i,m)-1));}
function payoffDate(s,m){var p=s.split('-');var d=new Date(parseInt(p[0]),parseInt(p[1])-1);d.setMonth(d.getMonth()+m);return d.toLocaleString('en-SG',{month:'short',year:'numeric'});}
function calcLoanCountdown(s,t){var p=s.split('-');var sd=new Date(parseInt(p[0]),parseInt(p[1])-1);var n=new Date();var mp=(n.getFullYear()-sd.getFullYear())*12+(n.getMonth()-sd.getMonth());if(mp<0)mp=0;if(mp>t)mp=t;return{paid:mp,remaining:t-mp,total:t,pct:Math.round((mp/t)*100)};}

function renderDashboard(d){
  var SGD_INR=d.sgd_inr||62,USD_INR=d.usd_inr||83;

  var adskPrice=d.adsk_price||238.08,sounPrice=d.soun_price||6.78;

  var moomooADSKUSD=MOOMOO_ADSK_QTY*adskPrice,moomooSOUNUSD=MOOMOO_SOUN_QTY*sounPrice,moomooUSD=moomooADSKUSD+moomooSOUNUSD;

  var indiaCommit=d.sip_monthly+d.ppf_monthly,totalOutflowL=sgCommitINRL+Math.round(indiaCommit/100000);

  // Allocation bar

function u8b64(u8){var s='';var CH=0x8000;for(var i=0;i<u8.length;i+=CH){s+=String.fromCharCode.apply(null,u8.subarray(i,i+CH));}return btoa(s);}
function b64u8(b){var bin=atob(b);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++){u[i]=bin.charCodeAt(i);}return u;}
async function deriveKey(pass,salt){var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encryptData(text,pass){var salt=crypto.getRandomValues(new Uint8Array(16));var iv=crypto.getRandomValues(new Uint8Array(12));var key=await deriveKey(pass,salt);var ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(text)));var out=new Uint8Array(28+ct.length);out.set(salt,0);out.set(iv,16);out.set(ct,28);return u8b64(out);}
async function decryptData(b64,pass){var raw=b64u8(b64);var salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);var key=await deriveKey(pass,salt);var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);return new TextDecoder().decode(pt);}
